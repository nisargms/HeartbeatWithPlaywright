name: Microsoft Ads UI Monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v5
    
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers & OS Deps
      run: npx playwright install --with-deps chromium

    - name: Run Uptime Check
      # We remove '--project=chromium' and use '--browser=chromium' instead
      run: |
        xvfb-run npx playwright test tests/ads-monitor.spec.js --browser=chromium
      env:
        CI: true
        PLAYWRIGHT_CHROMIUM_ARGS: '--no-sandbox --disable-setuid-sandbox --disable-gpu'

    - name: Upload Report on Failure
      if: failure()
      uses: actions/upload-artifact@v5
      with:
        name: ads-ui-failure-report
        path: playwright-report/
        retention-days: 5
