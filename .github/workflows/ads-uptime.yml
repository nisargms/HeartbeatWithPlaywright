name: Microsoft Ads UI Monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      # This clears the deprecation warning and forces the use of Node 24
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v5
    
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24' 
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers & OS Dependencies
      # The '--with-deps' is the critical part for Exit Code 254
      run: npx playwright install --with-deps chromium

    - name: Run Uptime Check
      run: xvfb-run npx playwright test tests/ads-monitor.spec.js
      env:
        CI: true

    - name: Upload Report on Failure
      if: failure()
      uses: actions/upload-artifact@v5
      with:
        name: ads-ui-failure-report
        path: playwright-report/
        retention-days: 5
